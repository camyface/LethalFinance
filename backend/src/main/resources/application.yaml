spring:
  application:
    name: LethalFinance

  datasource:
    url: jdbc:postgresql://localhost:5435/lethalFinance
    driver-class-name: org.postgresql.Driver
    username: user
    password: pass

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
